<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña — Gravity Streetwear</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0A0A0A">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Instrument+Serif:ital@1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="scroll-progress"></div>
<div class="auth-shell">
  <div class="auth-card">
    <a href="index.html" class="brand"><img src="assets/logo-mark-gravity.png" alt="Gravity">GRAVITY</a>
    <h1>Recuperar contraseña</h1>
    <p class="sub">Escribe tu correo y te enviamos un enlace para restablecerla.</p>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="reset-email">Correo</label>
        <input type="email" id="reset-email" autocomplete="username" required>
      </div>
      <div class="auth-error" id="reset-error" role="alert"></div>
      <div class="auth-success" id="reset-success" role="status"></div>
      <button type="submit" class="btn btn-primary" id="reset-submit">Enviar enlace</button>
    </form>

    <div class="auth-links">
      <a href="login.html">← Volver a iniciar sesión</a>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script type="module" src="js/auth-pages.js"></script>
</body>
</html>
